---
- name: Install DVWA
  hosts: dvwa
  become: true

  pre_tasks:
    - name: Validate the target operating system
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] == 'Ubuntu'
          - ansible_facts['distribution_version'] is version('24.04', '==')
        fail_msg: "This playbook supports Ubuntu 24.04 LTS only."

  roles:
    - common
    - db
    - php
    - web
